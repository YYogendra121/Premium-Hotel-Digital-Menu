<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Hotels & Resort-Online Order </title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#9A7A30;
  --bg:#0F0D0A;--bg2:#1A1712;--bg3:#232018;--bg4:#2C2820;
  --text:#F5EDD6;--text2:#B8A882;--text3:#7A6E56;
  --border:rgba(201,168,76,0.2);--border2:rgba(201,168,76,0.4);
}

body{
  background:var(--bg);
  font-family:'Inter',sans-serif;
  color:var(--text);
}

#app{
  min-height:100vh;
  padding-bottom:80px;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:0 20px;
}

/* HEADER */
.header{
  background:var(--bg2);
  border-bottom:1px solid var(--border2);
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:10;
}

.logo{display:flex;align-items:center;gap:8px}
.crown{color:var(--gold)}
.hotel-name{
  font-family:'Playfair Display',serif;
  font-size:14px;
  letter-spacing:2px;
  color:var(--gold);
}

.tabs{
  background:var(--bg2);
  padding:10px 20px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}

.tab{
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text2);
  cursor:pointer;
}

.tab.active{
  background:var(--gold);
  color:#000;
}

/* CATEGORY */
.category-tabs{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 0;
}

.cat-tab{
  padding:5px 12px;
  border-radius:20px;
  border:1px solid var(--border2);
  background:none;
  color:var(--text2);
  cursor:pointer;
}

.cat-tab.active{
  background:var(--gold);
  color:#000;
}

/* GRID */
.grid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(2,1fr);
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

@media(min-width:1024px){
  .grid{grid-template-columns:repeat(4,1fr);}
}

/* ITEM */
.item{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}

.item-img{
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  background:var(--bg3);
}

.item-info{
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.add-btn{
  background:var(--gold);
  border:none;
  padding:5px 10px;
  cursor:pointer;
}

.cart-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:var(--bg2);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  border-top:1px solid var(--border2);
}
</style>
</head>
  <meta property="og:title" content="Grand Royale Hotel">
<meta property="og:description" content="Luxury stay experience with premium facilities">
<meta property="og:image" content="WhatsApp Image 2026-04-24 at 14.26.57.jpeg/thumbnail.jpg">
<meta property="og:url" content="https://yyogendra121.github.io/Premium-Hotel-Digital-Menu/">
<meta property="og:type" content="website">

<body>

<div id="app">

<div class="header">
  <div class="logo">
    <span class="crown">♛</span>
    <span class="hotel-name">Royal Hotel & Resort</span>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="container">
  <div id="menu"></div>
</div>

<div class="cart-bar">
  <span id="count">0 items</span>
  <span id="total">₹0</span>
</div>
</div>

<script>
const meals=["Breakfast","Lunch","Dinner"];
let active="Breakfast";
let cart={};

const data={
Breakfast:[
{name:"Paneer",price:200,src:"https://source.unsplash.com/400x300/?paneer",emoji:"🧀"
},
{name:"Biryani",price:300,src:"https://source.unsplash.com/400x300/?biryani",emoji:"🍚"},
{name:"Noodles",price:150,src:"https://source.unsplash.com/400x300/?noodles",emoji:"🍜"},
{name:"Dal",price:120,src:"https://source.unsplash.com/400x300/?dal",emoji:"🍲"}
],
Lunch:[
{name:"Thali",price:400,src:"https://source.unsplash.com/400x300/?thali",emoji:"🍽️"},
{name:"Chicken",price:350,src:"https://source.unsplash.com/400x300/?chicken",emoji:"🍗"}
],
Dinner:[
{name:"Soup",price:150,src:"https://source.unsplash.com/400x300/?soup",emoji:"🍵"},
{name:"Dessert",price:120,src:"https://source.unsplash.com/400x300/?dessert",emoji:"🍮"}
]
};

function renderTabs(){
document.getElementById("tabs").innerHTML=
meals.map(m=>`<button class="tab ${m===active?"active":""}" onclick="switchMeal('${m}')">${m}</button>`).join("");
}

function switchMeal(m){
active=m;
renderTabs();
renderMenu();
}

function add(i){
cart[i]=(cart[i]||0)+1;
updateCart();
}

function updateCart(){
let count=0,total=0;
Object.entries(cart).forEach(([i,q])=>{
count+=q;
total+=q*200;
});
document.getElementById("count").innerText=count+" items";
document.getElementById("total").innerText="₹"+total;
}

function renderMenu(){
document.getElementById("menu").innerHTML=
`<div class="grid">
${data[active].map((item,i)=>`
<div class="item">
<div class="item-img">${item.emoji}</div>
<div class="item-info">
<span>${item.name}</span>
<button class="add-btn" onclick="add(${i})">+</button>
</div>
</div>`).join("")}
</div>`;
}

renderTabs();
renderMenu();
</script>

</body>
</html>
